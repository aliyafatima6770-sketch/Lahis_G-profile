<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuZhi Gamerz - Discord Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Whitney:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f0e6f5;
            --card-bg: #e8dff0;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --accent-purple: #5865f2;
            --accent-pink: #ff6b9d;
            --status-red: #ed4245;
            --button-bg: #7b68ee;
            --button-hover: #6a5acd;
        }

        body {
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            color: var(--text-primary);
        }

        .profile-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        /* Banner */
        .banner {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #8e44ad 100%);
            position: relative;
            overflow: hidden;
        }

        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Avatar Section */
        .avatar-section {
            position: relative;
            padding: 0 20px;
            margin-top: -50px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
        }

        .avatar-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid white;
            background: #2c2c54;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Status Badge */
        .status-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
        }

        .status-icon {
            width: 18px;
            height: 18px;
            background: var(--status-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
        }

        /* Status Bubble */
        .status-bubble {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--text-primary);
        }

        .status-bubble-icon {
            color: var(--status-red);
            font-size: 18px;
        }

        /* Profile Info */
        .profile-info {
            padding: 20px;
            background: var(--card-bg);
        }

        .display-name {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .username-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .username {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .dot-separator {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .nickname {
            font-size: 15px;
            color: var(--text-secondary);
        }

        /* Badges */
        .badges-container {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .badge {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .badge:hover {
            transform: scale(1.1);
        }

        .badge-purple { background: #9b59b6; color: white; }
        .badge-green { background: #2ecc71; color: white; }
        .badge-orange { background: #e67e22; color: white; }
        .badge-pink { background: #ff6b9d; color: white; }
        .badge-blue { background: #3498db; color: white; }

        /* Buttons */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .profile-btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-youtube {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
        }

        .btn-youtube:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 0, 0, 0.3);
        }

        .btn-discord {
            background: linear-gradient(135deg, #5865f2, #4752c4);
            color: white;
        }

        .btn-discord:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(88, 101, 242, 0.3);
        }

        /* About Section */
        .about-section {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 16px;
            margin-top: 10px;
        }

        .about-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .about-content {
            font-size: 15px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Badge Popup */
        .badge-popup {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: white;
            border-radius: 12px;
            padding: 16px 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10000;
            opacity: 0;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .badge-popup.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .badge-popup-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .badge-popup-text {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .profile-card {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Badge Popup -->
    <div class="badge-popup" id="badgePopup">
        <div class="badge-popup-icon" id="popupIcon">🏆</div>
        <span class="badge-popup-text" id="popupText">Badge Name</span>
    </div>

    <div class="profile-card">
        <!-- Banner -->
        <div class="banner">
            <img src="https://i.imgur.com/JQ9qR8a.jpeg" alt="Banner" id="bannerImg">
        </div>

        <!-- Avatar Section -->
        <div class="avatar-section">
            <div class="avatar-wrapper">
                <div class="avatar">
                    <img src="https://i.imgur.com/8Km9tLL.png" alt="Avatar" id="avatarImg">
                </div>
                <div class="status-badge">
                    <div class="status-icon">
                        <i class="fas fa-minus"></i>
                    </div>
                </div>
            </div>
            
            <div class="status-bubble">
                <i class="fas fa-crown status-bubble-icon"></i>
                <span>Me Iz AFK | Ping karoge to Gali Khaoge</span>
            </div>
        </div>

        <!-- Profile Info -->
        <div class="profile-info">
            <div class="display-name">TuZhi Gamerz</div>
            
            <div class="username-row">
                <span class="username">tuzhigamerz</span>
                <span class="dot-separator">•</span>
                <span class="nickname">TuZhi Codes</span>
            </div>

            <!-- Badges -->
            <div class="badges-container">
                <div class="badge badge-purple" onclick="showBadge('HypeSquad Balance', '🏆', 'badge-purple')">
                    <i class="fas fa-check"></i>
                </div>
                <div class="badge badge-green" onclick="showBadge('Active Developer', '👨‍💻', 'badge-green')">
                    <i class="fas fa-code"></i>
                </div>
                <div class="badge badge-orange" onclick="showBadge('Early Supporter', '⭐', 'badge-orange')">
                    <i class="fas fa-bolt"></i>
                </div>
                <div class="badge badge-pink" onclick="showBadge('Nitro', '💎', 'badge-pink')">
                    <i class="fas fa-gem"></i>
                </div>
                <div class="badge badge-blue" onclick="showBadge('Server Boosting', '🚀', 'badge-blue')">
                    <i class="fas fa-rocket"></i>
                </div>
            </div>

            <!-- Buttons -->
            <div class="buttons-container">
                <a href="https://youtube.com/@TuZhiCodes" target="_blank" class="profile-btn btn-youtube">
                    <i class="fab fa-youtube"></i>
                    YouTube @TuZhiCodes
                </a>
                
                <a href="https://discord.gg/gZKZQQdGMB" target="_blank" class="profile-btn btn-discord">
                    <i class="fab fa-discord"></i>
                    Discord Support
                </a>
                
                <a href="https://discord.gg/ERJdY5HYgx" target="_blank" class="profile-btn btn-discord">
                    <i class="fab fa-discord"></i>
                    Discord Community
                </a>
            </div>

            <!-- About Me -->
            <div class="about-section">
                <div class="about-label">About Me</div>
                <div class="about-content">
                    🐰 A Dreamer Who Never Sleeps !! 🐰
                </div>
            </div>
        </div>
    </div>

    <script>
        // Show badge popup
        function showBadge(name, icon, colorClass) {
            const popup = document.getElementById('badgePopup');
            const iconEl = document.getElementById('popupIcon');
            const textEl = document.getElementById('popupText');
            
            iconEl.textContent = icon;
            textEl.textContent = name;
            
            // Set color
            iconEl.className = 'badge-popup-icon ' + colorClass;
            
            popup.classList.add('show');
            
            // Hide after 5 seconds
            setTimeout(() => {
                popup.classList.remove('show');
            }, 5000);
        }

        // Load custom images from localStorage if available
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('tuzhicodes_profile');
            if (saved) {
                const profile = JSON.parse(saved);
                if (profile.avatar) document.getElementById('avatarImg').src = profile.avatar;
                if (profile.banner) document.getElementById('bannerImg').src = profile.banner;
            }
        });
    </script>
</body>
  </html>
